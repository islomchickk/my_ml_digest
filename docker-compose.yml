services:
  digest:
    build: .
    env_file: .env
    command: tail -f /dev/null  # keep alive for ofelia job-exec
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.digest.schedule: "0 0 9 * * 1"  # every Monday at 09:00
      ofelia.job-exec.digest.command: "uv run python main.py"

  scheduler:
    image: mcuadros/ofelia:latest
    depends_on:
      - digest
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
